<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅 오버레이</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; font-family:'Segoe UI','Malgun Gothic',sans-serif; overflow:hidden; }

/* ── 공통 ── */
.msg { display:flex; align-items:center; flex-wrap:wrap; gap:4px; }
.msg.out { pointer-events:none; }
.badges { display:flex; gap:2px; flex-shrink:0; }
.badge { font-size:10px; font-weight:800; padding:1px 5px; border-radius:3px; color:#fff; line-height:16px; flex-shrink:0; }
.nick  { font-weight:700; flex-shrink:0; }
.text  { word-break:break-all; }

/* ── 공통 키프레임 ── */
@keyframes fi  { from{opacity:0} to{opacity:1} }
@keyframes fo  { from{opacity:1} to{opacity:0} }
@keyframes sl  { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:none} }
@keyframes sr  { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:none} }
@keyframes pop { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:none} }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   1. 기본 — 하단 다크 버블 + 뱃지
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="1"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:4px;padding:8px 16px;pointer-events:none; }
[data-theme="1"] .msg { background:#00000088;backdrop-filter:blur(4px);border-radius:8px;padding:5px 10px;max-width:640px;font-size:14px;animation:sl .2s ease; }
[data-theme="1"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="1"] .text { color:#ffffffdd; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   2. 카카오톡 — 노란 말풍선
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="2"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:6px;padding:8px 14px;pointer-events:none; }
[data-theme="2"] .msg { background:#FEE500;border-radius:0 14px 14px 14px;padding:7px 12px;max-width:580px;flex-wrap:wrap;align-items:baseline;box-shadow:0 2px 8px #00000040;animation:sl .25s cubic-bezier(.175,.885,.32,1.275); }
[data-theme="2"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="2"] .badge { background:#3C1E1E !important;color:#FEE500 !important;font-size:9px; }
[data-theme="2"] .nick  { color:#3C1E1E;font-size:13px; }
[data-theme="2"] .text  { color:#1a1a1a;font-size:14px;width:100%;margin-top:2px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   3. 네온 — 닉 컬러 글로우 테두리
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="3"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:5px;padding:8px 16px;pointer-events:none; }
[data-theme="3"] .msg { background:#0a0b0ff0;border-radius:8px;padding:6px 12px;max-width:640px;font-size:14px;border:1px solid var(--nc);box-shadow:0 0 8px var(--glow),inset 0 0 6px var(--glow);animation:fi .3s ease; }
[data-theme="3"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="3"] .text { color:#ffffffcc; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   4. 박스 — 좌측 컬러 세로 보더
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="4"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:3px;padding:6px 0;pointer-events:none; }
[data-theme="4"] .msg { background:#141618f0;border-left:3px solid var(--nc);border-radius:0 6px 6px 0;padding:6px 14px;max-width:680px;font-size:14px;animation:sl .2s ease; }
[data-theme="4"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="4"] .text { color:#ffffffcc; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   5. 무지개 — 메시지별 그라데이션 테두리
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="5"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:5px;padding:8px 16px;pointer-events:none; }
[data-theme="5"] .msg { background:#1a1c23;border-radius:10px;padding:6px 12px;max-width:640px;font-size:14px;position:relative;animation:sl .25s ease; }
[data-theme="5"] .msg::before { content:'';position:absolute;inset:0;border-radius:10px;background:var(--grad);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:1.5px;pointer-events:none; }
[data-theme="5"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="5"] .text { color:#ffffffcc; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   6. 라운드 — pill 버블
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="6"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:5px;padding:8px 16px;pointer-events:none; }
[data-theme="6"] .msg { background:#252830ee;border-radius:30px;padding:6px 16px;max-width:620px;font-size:14px;border:1px solid #ffffff18;animation:sl .25s cubic-bezier(.175,.885,.32,1.275); }
[data-theme="6"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="6"] .badge { border-radius:20px; }
[data-theme="6"] .text { color:#ffffffdd; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   7. 풍선 — 말풍선 꼬리
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="7"] #c { position:fixed;bottom:0;left:0;right:0;max-height:500px;display:flex;flex-direction:column;gap:8px;padding:8px 24px;pointer-events:none; }
[data-theme="7"] .msg { background:#1e2230e8;backdrop-filter:blur(6px);border:1px solid #ffffff20;border-radius:4px 14px 14px 14px;padding:7px 13px;max-width:600px;position:relative;margin-left:8px;animation:sl .25s cubic-bezier(.175,.885,.32,1.275); }
[data-theme="7"] .msg::before { content:'';position:absolute;left:-7px;top:8px;width:0;height:0;border-top:7px solid transparent;border-right:8px solid #ffffff20;border-bottom:0; }
[data-theme="7"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="7"] .text { color:#ffffffee; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   8. 레트로 — 터미널 스타일
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="8"] #c { position:fixed;bottom:0;left:0;right:0;max-height:460px;display:flex;flex-direction:column;gap:1px;padding:6px 14px;pointer-events:none;font-family:'Courier New',monospace; }
[data-theme="8"] .msg { font-size:13px;padding:3px 2px;border-bottom:1px solid #00ff4115;animation:fi .15s ease; }
[data-theme="8"] .msg.out { animation:fo .3s ease forwards; }
[data-theme="8"] .badge { background:none !important;color:var(--nc) !important;padding:0;border-radius:0; }
[data-theme="8"] .badge::before { content:'['; color:#00ff41; }
[data-theme="8"] .badge::after  { content:']'; color:#00ff41; }
[data-theme="8"] .nick  { color:#00ff41;text-shadow:0 0 6px #00ff4180; }
[data-theme="8"] .text  { color:#c8ffcf; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   9. 포스트잇 — 스티커 카드
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="9"] #c { position:fixed;bottom:0;left:0;right:0;max-height:500px;display:flex;flex-direction:column;gap:6px;padding:10px 16px;pointer-events:none; }
[data-theme="9"] .msg { background:#FFF9C4;border-radius:4px 14px 14px 14px;border-top:3px solid var(--nc);padding:8px 12px;max-width:580px;box-shadow:2px 3px 10px #00000050;align-items:baseline;flex-wrap:wrap;animation:pop .3s cubic-bezier(.175,.885,.32,1.275); }
[data-theme="9"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="9"] .badge { color:#fff !important; }
[data-theme="9"] .nick  { color:#444; }
[data-theme="9"] .text  { color:#222;width:100%;margin-top:2px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   10. 게임 HUD — 우측 각진 패널
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="10"] #c { position:fixed;bottom:0;right:0;width:380px;max-height:500px;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;padding:10px 12px;pointer-events:none; }
[data-theme="10"] .msg { background:linear-gradient(90deg,#0f1923ee,#1a2432ee);border-top:1px solid #4fc3f720;padding:6px 12px;font-size:13px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);animation:sr .2s ease; }
[data-theme="10"] .msg.out { animation:fo .4s ease forwards; }
[data-theme="10"] .badge { border-radius:2px;font-size:9px; }
[data-theme="10"] .nick  { font-size:12px; }
[data-theme="10"] .text  { color:#cfe8ffcc;font-size:13px; }
</style>
</head>
<body>
<div id="c"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const theme = parseInt(new URLSearchParams(location.search).get('theme') || '1')
document.body.dataset.theme = theme

const socket = io()
const box    = document.getElementById('c')
const MAX    = 15

const COLORS = ['#FF6B9D','#C77DFF','#72EFDD','#F4A261','#90E0EF','#FFD166','#06D6A0','#EF476F','#00FFA3','#FF9500']
const GRADS  = [
  'linear-gradient(90deg,#FF6B9D,#C77DFF)',
  'linear-gradient(90deg,#72EFDD,#00FFA3)',
  'linear-gradient(90deg,#FFD166,#F4A261)',
  'linear-gradient(90deg,#A78BFA,#EC4899)',
  'linear-gradient(90deg,#06D6A0,#4FC3F7)',
  'linear-gradient(90deg,#EF476F,#FFD166)',
]
const BADGE_COLOR = { MANAGER:'#FF4444', FAN_CLUB:'#4488FF', STREAMER:'#FFB800', BROADCASTER:'#FFB800', STAFF:'#AA44FF' }
const BADGE_LABEL = { MANAGER:'M', FAN_CLUB:'F', STREAMER:'BJ', BROADCASTER:'BJ', STAFF:'S' }

const colorMap = {}; let gradIdx = 0

function getColor(nick) {
  if (!colorMap[nick]) {
    let h = 0; for (let i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h)
    colorMap[nick] = COLORS[Math.abs(h) % COLORS.length]
  }
  return colorMap[nick]
}

function renderBadges(badges) {
  if (!badges || !badges.length) return ''
  return badges.map(b => {
    const t = b.badgeType || b.type || ''
    const c = BADGE_COLOR[t] || '#666888'
    const l = BADGE_LABEL[t] || (t.charAt(0) || '?').toUpperCase()
    return `<span class="badge" style="background:${c}">${esc(l)}</span>`
  }).join('')
}

socket.on('chat', add)

function add(d) {
  const nc   = getColor(d.nickname)
  const grad = GRADS[gradIdx++ % GRADS.length]
  const el   = document.createElement('div')
  el.className = 'msg'
  el.style.setProperty('--nc',   nc)
  el.style.setProperty('--glow', nc + '50')
  el.style.setProperty('--grad', grad)
  el.innerHTML = `
    <div class="badges">${renderBadges(d.badges)}</div>
    <span class="nick" style="color:${nc}">${esc(d.nickname)}</span>
    <span class="text">${renderMsg(d.message, d.emojis)}</span>
  `
  box.appendChild(el)
  const all = box.querySelectorAll('.msg:not(.out)')
  if (all.length > MAX) { all[0].classList.add('out'); setTimeout(() => all[0].remove(), 400) }
}

function renderMsg(t, e) {
  if (!t) return ''
  return esc(t).replace(/\{:([^:]+):\}/g, (_, k) => {
    const u = (e || {})[k]
    return u ? `<img src="${u}" height="20" style="vertical-align:middle;margin:0 1px">` : `{:${k}:}`
  })
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
</script>
</body>
</html>
